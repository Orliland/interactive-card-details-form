<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Interactive card details form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <main class="main">
      <section class="main__section">
        <div class="card card--front">
          <img src="./images/bg-card-front.png" alt="" class="card__bg" />
          <img src="./images/card-logo.svg" alt="" class="card__logo" />
          <span class="card__number">0000 0000 0000 0000</span>
          <span class="card__holder">JAME APPLESEED</span>
          <span class="card__date">00/00</span>
        </div>
        <div class="card card--back">
          <img src="./images/bg-card-back.png" alt="" class="card__bg" />
          <span class="card__cvc">123</span>
        </div>
      </section>
      <section>
        <!-- TODO: build form section -->
      </section>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://orli.land">Orliland</a>.
    </footer>
  </body>
</html>
